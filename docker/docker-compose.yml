name: travelplanner
services:
  app:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/
    env_file:
      - .env
    networks:
      - appnet
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../log:/log

  mongo:
    image: mongo:8.2.6
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - appnet
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

networks:
  appnet:
    driver: bridge

volumes:
  mongo_data:
